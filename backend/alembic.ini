[alembic]
script_location = db/migrations
prepend_sys_path = .
sqlalchemy.url = mariadb+mariadbconnector://user:pass@localhost:3306/as_api_console

[test_db]
script_location = db/migrations
prepend_sys_path = .
sqlalchemy.url = mariadb+mariadbconnector://user:pass@localhost:3306/as_api_console_test

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
